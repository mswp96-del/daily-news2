const filters = document.getElementById("filters");
const content = document.getElementById("content");

function chip(label, key, color, active){
  const c = document.createElement("button");
  c.className = "chip" + (active ? " active" : "");
  c.textContent = label;
  if(active && color) c.style.background = color;
  c.dataset.key = key; c.dataset.color = color || "";
  c.onclick = () => setFilter(key);
  return c;
}

function render(){
  filters.innerHTML = "";
  filters.appendChild(chip("전체", "all", "#374151", true));
  SECTORS.forEach(s => filters.appendChild(chip(s.name, s.key, s.color, false)));

  content.innerHTML = "";
  SECTORS.forEach(s => {
    const sec = document.createElement("section");
    sec.className = "sector"; sec.dataset.key = s.key;
    sec.innerHTML = `<div class="sector-head"><span class="dot" style="background:${s.color}"></span>
      <h2>${s.name}</h2><span class="en">${s.en}</span></div>`;
    s.items.forEach(it => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<div class="headline">${it.h}</div>
        <div class="body">${it.b}</div>
        <div class="meta">
          <a class="src" href="${it.src}" target="_blank" rel="noopener">🔗 ${it.srcName}</a>
          <a class="yt" href="${it.yt}" target="_blank" rel="noopener">▶ 유튜브 검색</a>
        </div>`;
      sec.appendChild(card);
    });
    content.appendChild(sec);
  });
}

function setFilter(key){
  document.querySelectorAll(".chip").forEach(c => {
    const on = c.dataset.key === key;
    c.classList.toggle("active", on);
    c.style.background = on ? (c.dataset.color || "#374151") : "#fff";
    c.style.color = on ? "#fff" : "#374151";
  });
  document.querySelectorAll(".sector").forEach(sec => {
    sec.classList.toggle("hidden", key !== "all" && sec.dataset.key !== key);
  });
}

render();
</script>

const filters = document.getElementById("filters");
const content = document.getElementById("content");

function chip(label, key, color, active){
  const c = document.createElement("button");
  c.className = "chip" + (active ? " active" : "");
  c.textContent = label;
  if(active && color) c.style.background = color;
  c.dataset.key = key; c.dataset.color = color || "";
  c.onclick = () => setFilter(key);
  return c;
}

function render(){
  filters.innerHTML = "";
  filters.appendChild(chip("전체", "all", "#374151", true));
  SECTORS.forEach(s => filters.appendChild(chip(s.name, s.key, s.color, false)));

  content.innerHTML = "";
  SECTORS.forEach(s => {
    const sec = document.createElement("section");
    sec.className = "sector"; sec.dataset.key = s.key;
    sec.innerHTML = `<div class="sector-head"><span class="dot" style="background:${s.color}"></span>
      <h2>${s.name}</h2><span class="en">${s.en}</span></div>`;
    s.items.forEach(it => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<div class="headline">${it.h}</div>
        <div class="body">${it.b}</div>
        <div class="meta">
          <a class="src" href="${it.src}" target="_blank" rel="noopener">🔗 ${it.srcName}</a>
          <a class="yt" href="${it.yt}" target="_blank" rel="noopener">▶ 유튜브 검색</a>
        </div>`;
      sec.appendChild(card);
    });
    content.appendChild(sec);
  });
}

function setFilter(key){
  document.querySelectorAll(".chip").forEach(c => {
    const on = c.dataset.key === key;
    c.classList.toggle("active", on);
    c.style.background = on ? (c.dataset.color || "#374151") : "#fff";
    c.style.color = on ? "#fff" : "#374151";
  });
  document.querySelectorAll(".sector").forEach(sec => {
    sec.classList.toggle("hidden", key !== "all" && sec.dataset.key !== key);
  });
}

render();
</script>
